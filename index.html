<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayatımız Oyun Youtube Arşivi</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; margin: 0; }
        header { padding: 20px; background: #202020; border-bottom: 2px solid #ff0000; display: flex; justify-content: space-between; align-items: center; }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .version { background: #ff0000; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .login-btn { background: #007bff; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .login-btn:hover { background: #0056b3; }
        main { padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1 style="margin: 0; font-size: 24px;">Hayatımız Oyun Youtube Arşivi</h1>
            <span class="version">v0.0.2</span>
        </div>
        <a href="auth.html" class="login-btn">Giriş Yap / Kayıt Ol</a>
    </header>

    <main>
        <h2>Sistem Başarıyla Kuruldu!</h2>
        <p>Altyapı hazır. Supabase ve Vercel bağlantıları tamamlandı.</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-client.js"></script>
</body>
</html>
