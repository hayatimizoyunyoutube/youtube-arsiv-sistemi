<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayatımız Oyun Youtube Arşivi</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #0f0f0f; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 25px; background: #202020; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .login-btn { background: #3ea6ff; color: white; text-decoration: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        aside { width: 220px; background: #202020; padding: 20px 0; border-right: 1px solid #333; }
        .category-list { list-style: none; padding: 0; margin: 0; }
        .category-list li { padding: 12px 20px; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .category-list li:hover { background: #383838; }
        main { flex: 1; padding: 25px; overflow-y: auto; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>Hayatımız Oyun</h1>
        </div>
        <nav id="navbar">
            <a href="auth.html" id="auth-link" class="login-btn">Giriş Yap</a>
            <a href="admin.html" id="admin-link" class="login-btn" style="display:none; background:#ff0000;">Yönetim Paneli</a>
        </nav>
    </header>

    <div class="main-container">
        <aside>
            <ul class="category-list" id="category-list">
                </ul>
        </aside>

        <main>
            <div class="video-grid" id="video-grid">
                </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-client.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
