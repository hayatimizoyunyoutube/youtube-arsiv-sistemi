<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Video Yönetim Paneli</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .form-box { background: #202020; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: none; }
        button { background: #ff0000; color: white; width: 100%; padding: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Video Ekle</h2>
        <input type="text" id="title" placeholder="Video Başlığı">
        <input type="text" id="url" placeholder="YouTube URL">
        <select id="category"></select>
        <button id="add-btn">Kaydet</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-client.js"></script>
    <script>
        // Kategori yükle ve video kaydet kodları buraya gelecek
        document.getElementById('add-btn').addEventListener('click', async () => {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            const { error } = await supabase.from('videos').insert([{ title, youtube_url: url }]);
            if(error) alert(error.message); else alert("Video eklendi!");
        });
    </script>
</body>
</html>
