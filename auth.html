<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap / Kayıt Ol</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .auth-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; margin: 5px 0; border: none; border-radius: 4px; cursor: pointer; color: white; }
        #login-btn { background-color: #007bff; }
        #register-btn { background-color: #28a745; }
        #message { margin-top: 15px; font-size: 14px; color: #d9534f; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Hoş Geldiniz</h2>
        <input type="email" id="email" placeholder="E-posta adresiniz" required>
        <input type="password" id="password" placeholder="Şifreniz" required>
        
        <button id="login-btn">Giriş Yap</button>
        <button id="register-btn">Kayıt Ol</button>
        
        <div id="message"></div>
    </div>

    <!-- Supabase ve JS Bağlantıları -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-client.js"></script>
    <script src="./js/auth.js"></script>
</body>
</html>
