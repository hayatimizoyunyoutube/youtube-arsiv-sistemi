<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Hayatımız Oyun</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-box { background: #202020; padding: 30px; border-radius: 10px; border: 1px solid #333; width: 320px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .auth-box h2 { margin-top: 0; color: #ff0000; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #444; border-radius: 5px; background: #111; color: white; }
        button { width: 100%; padding: 10px; margin: 8px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        #login-btn { background-color: #007bff; }
        #login-btn:hover { background-color: #0056b3; }
        #register-btn { background-color: #28a745; }
        #register-btn:hover { background-color: #1c7430; }
        #message { margin-top: 15px; font-size: 14px; font-weight: bold; min-height: 20px; }
        .back-link { display: block; margin-top: 15px; color: #aaa; text-decoration: none; font-size: 12px; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="auth-box">
        <h2>Yetkili Girişi</h2>
        <input type="email" id="email" placeholder="E-posta Adresi" required>
        <input type="password" id="password" placeholder="Şifre" required>
        
        <button id="login-btn">Giriş Yap</button>
        <button id="register-btn">Yeni Kayıt Oluştur</button>
        
        <div id="message"></div>
        <a href="index.html" class="back-link">← Ana Sayfaya Dön</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-client.js"></script>
    <script src="./js/auth.js"></script>
</body>
</html>
